<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <path d="M 400 300 L 400 120 L 520 120 L 520 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject & Boarding People (Toyota Land Cruiser 2024) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="210" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Champagne Gold Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fafaf9" />
        <stop offset="50%" stop-color="#d6d3d1" />
        <stop offset="100%" stop-color="#78716c" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#1c1917" />
        <stop offset="100%" stop-color="#0c0a09" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(180, 275)">
      <circle cx="0" cy="0" r="34" fill="#0c0a09" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
    </g>
    <g transform="translate(420, 275)">
      <circle cx="0" cy="0" r="34" fill="#0c0a09" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
    </g>

    <!-- SUV Silhouette Side Profile -->
    <path d="M 80 275
             L 80 215
             C 80 205, 105 195, 125 185
             L 165 160
             C 185 145, 225 140, 305 140
             C 380 140, 440 145, 470 175
             L 510 215
             C 525 225, 530 240, 530 275
             Z" fill="url(#bodyGrad)" stroke="#d6d3d1" stroke-width="0.5" />
             
    <!-- Side Windows -->
    <path d="M 175 150 L 225 150 L 225 185 L 175 185 Z" fill="url(#glassGrad)" />
    <path d="M 335 150 L 425 150 L 415 185 L 335 185 Z" fill="url(#glassGrad)" />

    <!-- Open Executive Rear Door Space -->
    <rect x="230" y="145" width="100" height="126" fill="#0c0a09" rx="5" />
    <rect x="240" y="195" width="40" height="30" fill="#292524" rx="2" /> <!-- Seats -->

    <!-- Chauffeur Standing and Holding the Door Open (Black person, Navy Suit) -->
    <g id="chauffeur" transform="translate(195, 160)">
      <!-- Head (Black Skin Color) -->
      <circle cx="0" cy="15" r="9" fill="#3b2314" />
      <!-- Cap -->
      <path d="M -9 12 L 9 12 L 12 7 L -4 7 Z" fill="#050548" />
      <!-- Chauffeur Suit (navy blue: #050548) -->
      <path d="M -10 26 C -10 26, -5 24, 0 26 C 5 24, 10 26, 10 42 L 6 95 L -6 95 Z" fill="#050548" />
      <!-- White shirt / black tie -->
      <path d="M -2 26 L 0 32 L 2 26 Z" fill="#ffffff" />
      <path d="M -1 30 L 0 45 L 1 30 Z" fill="#000000" />
      <!-- Legs -->
      <path d="M -4 95 L -6 125 M 4 95 L 6 125" stroke="#050548" stroke-width="6" />
      <!-- Hand welcoming passenger (Black Skin Color) -->
      <path d="M 9 32 Q 22 35 15 48" stroke="#3b2314" stroke-width="4.5" fill="none" stroke-linecap="round" />
    </g>

    <!-- Passenger Boarding (Black woman, Yellow Dress) -->
    <g id="passenger" transform="translate(255, 172)">
      <!-- Head (Black Skin Color) -->
      <circle cx="0" cy="15" r="9" fill="#78350f" />
      <!-- Dress (Bright Yellow summer dress) -->
      <path d="M -8 26 C -8 26, -4 24, 0 24 C 4 24, 8 26, 8 40 L 14 85 L -14 85 Z" fill="#eab308" />
      <path d="M -4 85 L -8 110 M 4 85 L 6 110" stroke="#78350f" stroke-width="5" />
    </g>

    <!-- Open Passenger Door (Hinged at the front, opening outwards/forward) -->
    <!-- Hinged at x=230 (front of the rear door slot) -->
    <!-- Door Panel flapped out to the left in perspective -->
    <path d="M 230 145 L 205 135 L 205 255 L 230 265 Z" fill="url(#bodyGrad)" stroke="#d6d3d1" stroke-width="1" />
    <path d="M 230 145 L 205 135 L 210 185 L 230 185 Z" fill="url(#glassGrad)" />
  </g>
</svg>
