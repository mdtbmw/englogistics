<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <path d="M 50 300 Q 150 200 300 200 T 550 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Land Cruiser 2024 - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Champagne Gold Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fafaf9" />
        <stop offset="50%" stop-color="#d6d3d1" />
        <stop offset="100%" stop-color="#78716c" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1c1917" />
        <stop offset="100%" stop-color="#0c0a09" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(175, 275)">
      <circle cx="0" cy="0" r="32" fill="#0c0a09" />
      <circle cx="0" cy="0" r="20" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
    </g>
    <g transform="translate(425, 275)">
      <circle cx="0" cy="0" r="32" fill="#0c0a09" />
      <circle cx="0" cy="0" r="20" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
    </g>

    <!-- SUV Tall Silhouette -->
    <path d="M 145 280 
             L 145 140 
             C 145 135, 165 132, 175 132
             L 425 132
             C 450 132, 455 135, 455 140
             L 455 280
             Z" fill="url(#bodyGrad)" stroke="#d6d3d1" stroke-width="0.5" />
             
    <!-- Large Rear Glass -->
    <path d="M 160 142 L 440 142 L 440 195 L 160 195 Z" fill="url(#glassGrad)" />
             
    <!-- Spare Tire/Logo styling -->
    <line x1="210" y1="230" x2="390" y2="230" stroke="#a8a29e" stroke-width="2.5" />
    <text x="300" y="222" font-family="'Outfit', sans-serif" font-weight="900" font-size="10" fill="#78716c" text-anchor="middle" letter-spacing="1">LAND CRUISER</text>
    
    <!-- Tail Lights -->
    <rect x="148" y="200" width="10" height="40" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    <rect x="442" y="200" width="10" height="40" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />

    <!-- License Plate -->
    <rect x="270" y="250" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="259" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
