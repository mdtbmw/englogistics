<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office plaza outlines -->
    <path d="M 50 300 L 50 150 L 150 150 L 150 300" stroke-dasharray="3,3" />
    <path d="M 480 300 L 480 180 L 550 180 Z" stroke-dasharray="2,2" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Prado 2025 - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="200" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- White / Silver Metallic Body Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="50%" stop-color="#f4f4f5" />
        <stop offset="100%" stop-color="#cbd5e1" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#18181b" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#020617" />
        <stop offset="100%" stop-color="#1e293b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(165, 275)">
      <circle cx="0" cy="0" r="34" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#64748b" stroke="#f1f5f9" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#cbd5e1" />
    </g>
    <g transform="translate(435, 275)">
      <circle cx="0" cy="0" r="34" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#64748b" stroke="#f1f5f9" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#cbd5e1" />
    </g>

    <!-- Prado Tall Silhouette -->
    <path d="M 130 270 
             C 130 220, 150 200, 170 190 
             C 195 175, 220 135, 270 135 
             C 320 135, 380 140, 430 190
             C 450 200, 470 220, 470 270
             Z" fill="url(#bodyGrad)" stroke="#cbd5e1" stroke-width="0.5" />
             
    <!-- Windshield -->
    <path d="M 225 185 
             C 235 152, 270 145, 290 145 
             C 330 145, 365 152, 375 185 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Hood (Rugged double lines of Prado) -->
    <path d="M 175 190 C 220 190, 380 190, 430 190 C 445 220, 450 240, 435 245 C 380 248, 220 248, 165 245 Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
    
    <!-- Bold Front Grille (Prado vertical bar style) -->
    <path d="M 220 245 C 250 247, 350 247, 380 245 C 375 278, 225 278, 220 245 Z" fill="url(#grilleGrad)" stroke="#52525b" stroke-width="1.5" />
    <!-- Vertical grille slots -->
    <line x1="240" y1="248" x2="240" y2="274" stroke="#71717a" stroke-width="2" />
    <line x1="260" y1="249" x2="260" y2="276" stroke="#71717a" stroke-width="2" />
    <line x1="280" y1="250" x2="280" y2="277" stroke="#71717a" stroke-width="2" />
    <line x1="300" y1="250" x2="300" y2="277" stroke="#71717a" stroke-width="2" />
    <line x1="320" y1="250" x2="320" y2="277" stroke="#71717a" stroke-width="2" />
    <line x1="340" y1="249" x2="340" y2="276" stroke="#71717a" stroke-width="2" />
    <line x1="360" y1="248" x2="360" y2="274" stroke="#71717a" stroke-width="2" />
    <!-- Toyota Logo -->
    <circle cx="300" cy="254" r="8" fill="none" stroke="#cbd5e1" stroke-width="2" />
    
    <!-- Headlights -->
    <path d="M 170 242 C 185 242, 215 245, 218 248 C 208 255, 180 255, 170 246 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 3px #60a5fa)" />
    <path d="M 430 242 C 415 242, 385 245, 382 248 C 392 255, 420 255, 430 246 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 3px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="280" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="289" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
