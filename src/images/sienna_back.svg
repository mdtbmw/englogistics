<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy residential houses / street signs -->
    <path d="M 50 300 L 50 180 L 120 120 L 190 180 M 120 120 L 120 300" stroke-dasharray="3,3" />
    <path d="M 500 300 L 500 200 L 540 220" stroke-dasharray="2,2" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Sienna Minivan - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under minivan -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Warm Bronze/Champagne Metallic Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" />
        <stop offset="50%" stop-color="#cbd5e1" />
        <stop offset="100%" stop-color="#64748b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#334155" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(175, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#cbd5e1" stroke-width="1.5" />
    </g>
    <g transform="translate(425, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#cbd5e1" stroke-width="1.5" />
    </g>

    <!-- Minivan Silhouette (Sienna aerodynamics shape) -->
    <path d="M 145 280 
             L 145 150 
             C 145 140, 165 135, 175 135
             L 425 135
             C 455 135, 455 140, 455 150
             L 455 280
             Z" fill="url(#bodyGrad)" stroke="#94a3b8" stroke-width="0.5" />
             
    <!-- Large Rear Glass -->
    <path d="M 160 142 L 440 142 L 440 195 L 160 195 Z" fill="url(#glassGrad)" />
             
    <!-- Chrome Trim and Logo -->
    <line x1="210" y1="250" x2="390" y2="250" stroke="#cbd5e1" stroke-width="2.5" />
    <circle cx="300" cy="244" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
    
    <!-- Tail Lights (Wide angled lights of Sienna) -->
    <path d="M 150 240 C 165 240, 190 242, 192 248 C 182 252, 160 252, 150 245 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    <path d="M 450 240 C 435 240, 410 242, 408 248 C 418 252, 440 252, 450 245 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />

    <!-- License Plate -->
    <rect x="270" y="260" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="269" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
