<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office buildings outline -->
    <path d="M 40 300 L 40 180 L 100 180 M 100 220 L 160 220" stroke-dasharray="3,3" />
    <path d="M 500 300 L 500 160 L 560 160" stroke-dasharray="2,2" />
    <!-- Horizon / Ground -->
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Camry 2010 - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under car -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Navy Blue Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e3a8a" />
        <stop offset="50%" stop-color="#172554" />
        <stop offset="100%" stop-color="#0f172a" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#020617" />
        <stop offset="100%" stop-color="#1e293b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(175, 275)">
      <circle cx="0" cy="0" r="32" fill="#18181b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
    </g>
    <g transform="translate(425, 275)">
      <circle cx="0" cy="0" r="32" fill="#18181b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
    </g>

    <!-- Car Upper Cabin & Roof -->
    <path d="M 150 270 
             C 150 220, 180 200, 200 195 
             C 230 180, 250 148, 290 148 
             C 340 148, 370 180, 400 195
             C 420 200, 450 220, 450 270
             Z" fill="url(#bodyGrad)" stroke="#2563eb" stroke-width="0.5" />
             
    <!-- Rear Windshield -->
    <path d="M 235 195 
             C 245 160, 275 155, 290 155 
             C 325 155, 355 160, 365 195 Z" fill="url(#glassGrad)" />
             
    <!-- Trunk / Boot Lid -->
    <path d="M 190 200 C 230 200, 370 200, 410 200 C 430 225, 435 240, 420 255 C 380 258, 220 258, 180 255 Z" fill="url(#bodyGrad)" stroke="#1e40af" stroke-width="1" />
    
    <!-- Tail Lights & Bumper -->
    <!-- Bumper -->
    <path d="M 155 255 C 200 260, 400 260, 445 255 C 455 275, 435 295, 415 295 C 370 295, 230 295, 185 295 Z" fill="url(#bodyGrad)" />
    
    <!-- Left Tail Light (Camry 2010 wrap-around style) -->
    <path d="M 165 248 C 180 248, 195 250, 198 256 C 188 260, 172 260, 165 253 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    <!-- Right Tail Light -->
    <path d="M 435 248 C 420 248, 405 250, 402 256 C 412 260, 428 260, 435 253 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    
    <!-- Chrome Trim -->
    <line x1="210" y1="254" x2="390" y2="254" stroke="#e4e4e7" stroke-width="2.5" />
    <circle cx="300" cy="248" r="5" fill="none" stroke="#d4d4d8" stroke-width="1.5" />

    <!-- License Plate -->
    <rect x="270" y="263" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="272" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
