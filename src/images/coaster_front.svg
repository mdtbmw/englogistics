<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy event hall / wedding canopy in the background -->
    <path d="M 50 300 Q 150 200 300 200 T 550 300 M 300 200 L 300 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Coaster Bus - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under bus -->
    <ellipse cx="300" cy="310" rx="210" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Silver/Champagne Gradients for Coaster Bus -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f5f5f4" />
        <stop offset="60%" stop-color="#e7e5e4" />
        <stop offset="100%" stop-color="#a8a29e" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1c1917" />
        <stop offset="100%" stop-color="#44403c" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(160, 280)">
      <circle cx="0" cy="0" r="35" fill="#1c1917" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e7e5e4" />
    </g>
    <g transform="translate(440, 280)">
      <circle cx="0" cy="0" r="35" fill="#1c1917" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e7e5e4" />
    </g>

    <!-- Coaster Bus Silhouette (Tall, wide, luxury coach shape) -->
    <path d="M 120 280 
             L 120 130 
             C 120 120, 145 115, 175 115
             L 425 115
             C 455 115, 480 125, 480 170
             L 480 280
             Z" fill="url(#bodyGrad)" stroke="#a8a29e" stroke-width="1" />
             
    <!-- Large Front Panoramic Glass -->
    <path d="M 180 175 L 420 175 L 445 125 L 155 125 Z" fill="url(#glassGrad)" />
    <!-- Side Windows -->
    <path d="M 125 130 L 150 130 L 175 175 L 125 175 Z" fill="url(#glassGrad)" />
    <path d="M 450 130 L 475 130 L 475 175 L 425 175 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Grill Front Panel -->
    <path d="M 160 180 C 210 180, 390 180, 440 180 C 455 210, 460 235, 445 245 C 390 248, 210 248, 155 245 C 140 235, 145 210, 160 180 Z" fill="url(#bodyGrad)" stroke="#a8a29e" stroke-width="1" />
    
    <!-- Bold Front Grille and Headlights -->
    <path d="M 210 242 C 240 244, 360 244, 390 242 C 385 260, 215 260, 210 242 Z" fill="#292524" stroke="#d6d3d1" stroke-width="1" />
    <circle cx="300" cy="250" r="7" fill="none" stroke="#d6d3d1" stroke-width="1.5" />
    
    <rect x="155" y="235" width="45" height="18" rx="5" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="1.5" filter="drop-shadow(0 0 3px #e7e5e4)" />
    <rect x="400" y="235" width="45" height="18" rx="5" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="1.5" filter="drop-shadow(0 0 3px #e7e5e4)" />

    <!-- License Plate -->
    <rect x="270" y="275" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="284" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
