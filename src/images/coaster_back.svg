<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy event hall / wedding canopy in the background -->
    <path d="M 50 300 Q 150 200 300 200 M 300 200 L 300 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Coaster Bus - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under bus -->
    <ellipse cx="300" cy="310" rx="210" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Silver/Champagne Gradients for Coaster Bus -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f5f5f4" />
        <stop offset="60%" stop-color="#e7e5e4" />
        <stop offset="100%" stop-color="#a8a29e" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1c1917" />
        <stop offset="100%" stop-color="#44403c" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(170, 280)">
      <circle cx="0" cy="0" r="35" fill="#1c1917" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
    </g>
    <g transform="translate(430, 280)">
      <circle cx="0" cy="0" r="35" fill="#1c1917" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
    </g>

    <!-- Coaster Bus Silhouette (Tall, wide, luxury coach shape) -->
    <path d="M 130 280 
             L 130 120 
             C 130 115, 150 112, 175 112
             L 425 112
             C 450 112, 470 115, 470 120
             L 470 280
             Z" fill="url(#bodyGrad)" stroke="#a8a29e" stroke-width="1" />
             
    <!-- Large Rear Glass -->
    <path d="M 150 125 L 450 125 L 450 185 L 150 185 Z" fill="url(#glassGrad)" />
             
    <!-- Rear Logo / Handles -->
    <circle cx="300" cy="205" r="7" fill="none" stroke="#78716c" stroke-width="1" />
    <rect x="290" y="215" width="20" height="5" fill="#78716c" rx="1" />
    
    <!-- Tail Lights -->
    <rect x="135" y="200" width="12" height="60" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5" filter="drop-shadow(0 0 3px #ef4444)" rx="2" />
    <rect x="453" y="200" width="12" height="60" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5" filter="drop-shadow(0 0 3px #ef4444)" rx="2" />

    <!-- License Plate -->
    <rect x="270" y="255" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="264" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
