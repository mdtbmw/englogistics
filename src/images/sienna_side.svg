<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office buildings / trees -->
    <path d="M 50 300 Q 55 240 60 180" />
    <path d="M 530 300 Q 525 250 520 200" />
    <path d="M 10 300 L 590 300" stroke-dasharray="5,5" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Sienna Minivan - Side View) -->
  <g id="vehicle">
    <!-- Shadow under minivan -->
    <ellipse cx="300" cy="305" rx="210" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Warm Bronze/Champagne Metallic Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" />
        <stop offset="50%" stop-color="#cbd5e1" />
        <stop offset="100%" stop-color="#64748b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#334155" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(180, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#cbd5e1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#f1f5f9" />
    </g>
    <g transform="translate(420, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#cbd5e1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#f1f5f9" />
    </g>

    <!-- Minivan Silhouette Side Profile -->
    <path d="M 80 275
             L 80 230
             C 80 220, 110 205, 130 195
             L 170 170
             C 190 155, 230 150, 310 150
             C 380 150, 440 155, 470 185
             L 510 225
             C 525 235, 530 250, 530 275
             Z" fill="url(#bodyGrad)" stroke="#94a3b8" stroke-width="0.5" />
             
    <!-- Side Windows -->
    <path d="M 180 160 L 230 160 L 230 195 L 180 195 Z" fill="url(#glassGrad)" />
    <path d="M 240 160 L 330 160 L 330 195 L 240 195 Z" fill="url(#glassGrad)" />
    <path d="M 340 160 L 430 160 L 420 195 L 340 195 Z" fill="url(#glassGrad)" />
    <path d="M 440 160 L 485 160 L 475 195 L 435 195 Z" fill="url(#glassGrad)" />
             
    <!-- Door Panel, Sliding track -->
    <line x1="235" y1="150" x2="235" y2="275" stroke="#475569" stroke-width="1" />
    <line x1="335" y1="150" x2="335" y2="275" stroke="#475569" stroke-width="1" />
    <!-- Sliding door track line on rear panel -->
    <line x1="340" y1="210" x2="480" y2="210" stroke="#475569" stroke-width="1" stroke-dasharray="2,2" />
    <!-- Door handles -->
    <rect x="245" y="212" width="15" height="4" fill="#e2e8f0" rx="1" stroke="#475569" stroke-width="0.5" />
    <rect x="195" y="212" width="15" height="4" fill="#e2e8f0" rx="1" stroke="#475569" stroke-width="0.5" />
  </g>
</svg>
