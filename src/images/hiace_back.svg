<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy airport departures terminal facade -->
    <path d="M 60 300 L 60 100 L 540 100 L 540 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Hiace Bus - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under bus -->
    <ellipse cx="300" cy="310" rx="200" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- White / Silver Body Gradients for Hiace Bus -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="60%" stop-color="#f4f4f5" />
        <stop offset="100%" stop-color="#d4d4d8" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(170, 280)">
      <circle cx="0" cy="0" r="34" fill="#18181b" />
      <circle cx="0" cy="0" r="22" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
    </g>
    <g transform="translate(430, 280)">
      <circle cx="0" cy="0" r="34" fill="#18181b" />
      <circle cx="0" cy="0" r="22" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
    </g>

    <!-- Bus Silhouette (Hiace Boxy Shape) -->
    <path d="M 140 280 
             L 140 140 
             C 140 135, 160 132, 175 132
             L 425 132
             C 450 132, 460 135, 460 140
             L 460 280
             Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
             
    <!-- Large Rear Window -->
    <path d="M 160 145 L 440 145 L 440 200 L 160 200 Z" fill="url(#glassGrad)" />
             
    <!-- Rear Door Handles / Logo -->
    <rect x="290" y="225" width="20" height="6" fill="#a1a1aa" rx="1" />
    <circle cx="300" cy="215" r="6" fill="none" stroke="#71717a" stroke-width="1" />
    
    <!-- Tail Lights (Vertical rectangular tail lights of Hiace) -->
    <rect x="145" y="210" width="10" height="50" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    <rect x="445" y="210" width="10" height="50" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />

    <!-- License Plate -->
    <rect x="270" y="255" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="264" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
