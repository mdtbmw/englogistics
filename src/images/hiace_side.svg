<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office environment / trees -->
    <path d="M 50 300 Q 55 240 60 180" />
    <path d="M 530 300 Q 525 250 520 200" />
    <path d="M 10 300 L 590 300" stroke-dasharray="5,5" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Hiace Bus - Side View) -->
  <g id="vehicle">
    <!-- Shadow under bus -->
    <ellipse cx="300" cy="305" rx="220" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- White / Silver Body Gradients for Hiace Bus -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="60%" stop-color="#f4f4f5" />
        <stop offset="100%" stop-color="#d4d4d8" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(170, 275)">
      <circle cx="0" cy="0" r="34" fill="#18181b" />
      <circle cx="0" cy="0" r="22" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>
    <g transform="translate(430, 275)">
      <circle cx="0" cy="0" r="34" fill="#18181b" />
      <circle cx="0" cy="0" r="22" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>

    <!-- Bus Silhouette Side Profile -->
    <path d="M 80 275
             L 80 155
             C 80 145, 100 135, 120 135
             L 480 135
             C 500 135, 520 145, 520 180
             L 520 275
             Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
             
    <!-- Passenger Side Windows -->
    <path d="M 90 145 L 140 145 L 140 190 L 90 190 Z" fill="url(#glassGrad)" />
    <path d="M 150 145 L 230 145 L 230 190 L 150 190 Z" fill="url(#glassGrad)" />
    <path d="M 240 145 L 320 145 L 320 190 L 240 190 Z" fill="url(#glassGrad)" />
    <path d="M 330 145 L 410 145 L 410 190 L 330 190 Z" fill="url(#glassGrad)" />
    <path d="M 420 145 L 500 145 L 490 190 L 420 190 Z" fill="url(#glassGrad)" />
             
    <!-- Door Panels, Handles, Mirror -->
    <line x1="145" y1="135" x2="145" y2="275" stroke="#a1a1aa" stroke-width="1" />
    <line x1="235" y1="135" x2="235" y2="275" stroke="#a1a1aa" stroke-width="1" />
    <!-- Sliding door handle -->
    <rect x="250" y="210" width="18" height="5" fill="#a1a1aa" rx="1" stroke="#52525b" stroke-width="0.5" />
    <!-- Driver door handle -->
    <rect x="110" y="210" width="15" height="5" fill="#a1a1aa" rx="1" stroke="#52525b" stroke-width="0.5" />
  </g>
</svg>
