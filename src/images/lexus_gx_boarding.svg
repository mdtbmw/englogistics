<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office plaza / entry pillar -->
    <path d="M 420 300 L 420 120 L 520 120 M 460 120 L 460 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject, Executive & Security Detail (Lexus GX SUV) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="210" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Glossy Obsidian Black Gradients for Lexus GX -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#27272a" />
        <stop offset="50%" stop-color="#18181b" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#020617" />
        <stop offset="100%" stop-color="#1e293b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(180, 275)">
      <circle cx="0" cy="0" r="32" fill="#09090b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#cbd5e1" stroke-width="1.5" />
    </g>
    <g transform="translate(420, 275)">
      <circle cx="0" cy="0" r="32" fill="#09090b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#cbd5e1" stroke-width="1.5" />
    </g>

    <!-- SUV Silhouette Side Profile -->
    <path d="M 80 275
             L 80 215
             C 80 205, 105 195, 125 185
             L 165 160
             C 185 145, 225 140, 305 140
             C 380 140, 440 145, 470 175
             L 510 215
             C 525 225, 530 240, 530 275
             Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="0.5" />
             
    <!-- Side Windows -->
    <path d="M 175 150 L 225 150 L 225 185 L 175 185 Z" fill="url(#glassGrad)" />
    <path d="M 335 150 L 425 150 L 415 185 L 335 185 Z" fill="url(#glassGrad)" />

    <!-- Open Executive Rear Door Space -->
    <rect x="230" y="145" width="100" height="126" fill="#0f172a" rx="5" />
    
    <!-- Security Detail / Chauffeur Standing and Greeting (Black person, Navy Suit) -->
    <g id="security" transform="translate(205, 160)">
      <!-- Head (Black Skin Color: #451a03) -->
      <circle cx="0" cy="12" r="8" fill="#451a03" />
      <!-- Chauffeur Suit (navy blue: #050548) -->
      <path d="M -9 24 C -9 24, -4 22, 0 24 C 4 22, 9 24, 9 40 L 6 95 L -6 95 Z" fill="#050548" />
      <path d="M -2 24 L 0 30 L 2 24 Z" fill="#ffffff" /> <!-- white shirt -->
      <path d="M -1 28 L 0 40 L 1 28 Z" fill="#000000" /> <!-- black tie -->
      <path d="M -4 95 L -6 125 M 4 95 L 6 125" stroke="#050548" stroke-width="5.5" />
    </g>

    <!-- VIP Executive Boarding (Black person, Luxury White Suit) -->
    <g id="executive" transform="translate(265, 170)">
      <!-- Head (Black Skin Color: #5f3e2d) -->
      <circle cx="0" cy="12" r="8" fill="#5f3e2d" />
      <!-- White Suit -->
      <path d="M -8 24 C -8 24, -4 22, 0 24 C 4 22, 8 24, 8 40 L 5 85 L -5 85 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5" />
      <path d="M -3 85 L -8 110 M 3 85 L 6 110" stroke="#f8fafc" stroke-width="6" />
    </g>

    <!-- Open Executive Rear Door (Hinged at the front, opening outwards/forward) -->
    <!-- Hinged at x=230 (front of the rear door slot) -->
    <path d="M 230 145 L 205 135 L 205 255 L 230 265 Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="1" />
    <path d="M 230 145 L 205 135 L 210 185 L 230 185 Z" fill="url(#glassGrad)" />
  </g>
</svg>
