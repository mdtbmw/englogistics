<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <path d="M 50 300 Q 150 200 300 200 T 550 300 M 300 200 L 300 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Land Cruiser 2024 - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="200" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Champagne Gold Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fafaf9" />
        <stop offset="50%" stop-color="#d6d3d1" />
        <stop offset="100%" stop-color="#78716c" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#292524" />
        <stop offset="100%" stop-color="#0c0a09" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1c1917" />
        <stop offset="100%" stop-color="#0c0a09" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(165, 275)">
      <circle cx="0" cy="0" r="34" fill="#0c0a09" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#f5f5f4" />
    </g>
    <g transform="translate(435, 275)">
      <circle cx="0" cy="0" r="34" fill="#0c0a09" />
      <circle cx="0" cy="0" r="22" fill="#78716c" stroke="#d6d3d1" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#f5f5f4" />
    </g>

    <!-- SUV Tall Silhouette (Land Cruiser Bold Stance) -->
    <path d="M 130 270 
             C 130 220, 150 200, 170 190 
             C 195 175, 220 135, 270 135 
             C 320 135, 380 140, 430 190
             C 450 200, 470 220, 470 270
             Z" fill="url(#bodyGrad)" stroke="#d6d3d1" stroke-width="0.5" />
             
    <!-- Windshield -->
    <path d="M 225 185 
             C 235 152, 270 145, 290 145 
             C 330 145, 365 152, 375 185 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Hood -->
    <path d="M 175 190 C 220 190, 380 190, 430 190 C 445 220, 450 240, 435 245 C 380 248, 220 248, 165 245 Z" fill="url(#bodyGrad)" stroke="#a8a29e" stroke-width="1" />
    
    <!-- Bold Front Grille -->
    <path d="M 220 245 C 250 247, 350 247, 380 245 C 375 278, 225 278, 220 245 Z" fill="url(#grilleGrad)" stroke="#57534e" stroke-width="1.5" />
    <!-- Toyota wordmark in Grille -->
    <text x="300" y="265" font-family="'Outfit', sans-serif" font-weight="900" font-size="10" fill="#ffffff" text-anchor="middle" letter-spacing="2.5">TOYOTA</text>
    
    <!-- Large square LED Headlights -->
    <rect x="172" y="240" width="38" height="15" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 3px #60a5fa)" />
    <rect x="390" y="240" width="38" height="15" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 3px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="280" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="289" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
