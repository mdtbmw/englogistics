<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy residential houses / street signs -->
    <path d="M 50 300 L 50 180 L 120 120 L 190 180 L 190 300" stroke-dasharray="3,3" />
    <path d="M 120 120 L 120 300" stroke-dasharray="3,3" />
    <path d="M 500 300 L 500 200 L 540 220 L 540 300" stroke-dasharray="2,2" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Sienna Minivan - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under minivan -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Warm Bronze/Champagne Metallic Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" />
        <stop offset="50%" stop-color="#cbd5e1" />
        <stop offset="100%" stop-color="#64748b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#334155" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="100%" stop-color="#0f172a" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(170, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#e2e8f0" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#f1f5f9" />
    </g>
    <g transform="translate(430, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#e2e8f0" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#f1f5f9" />
    </g>

    <!-- Minivan Silhouette (Sienna aerodynamics shape) -->
    <path d="M 135 270 
             C 135 235, 155 215, 175 205 
             C 210 190, 240 148, 290 148 
             C 340 148, 395 152, 425 205
             C 445 215, 465 235, 465 270
             Z" fill="url(#bodyGrad)" stroke="#94a3b8" stroke-width="0.5" />
             
    <!-- Large Aerodynamic Windshield -->
    <path d="M 225 195 
             C 235 162, 270 155, 290 155 
             C 330 155, 365 162, 375 195 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Hood (sloping down) -->
    <path d="M 175 205 C 220 205, 380 205, 425 205 C 445 230, 448 245, 435 252 C 380 255, 220 255, 165 252 Z" fill="url(#bodyGrad)" stroke="#475569" stroke-width="1" />
    
    <!-- Front Bumper, Headlights & Grille -->
    <!-- Bumper -->
    <path d="M 152 252 C 200 258, 400 258, 448 252 C 458 272, 438 292, 418 292 C 370 292, 230 292, 182 292 C 162 292, 142 272, 152 252 Z" fill="url(#bodyGrad)" />
    
    <!-- Grille (Toyota Sienna Style) -->
    <path d="M 220 252 C 255 254, 345 254, 380 252 C 375 272, 225 272, 220 252 Z" fill="url(#grilleGrad)" stroke="#cbd5e1" stroke-width="1.5" />
    <circle cx="300" cy="260" r="7" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
    
    <!-- Headlights -->
    <path d="M 170 248 C 185 248, 210 250, 212 255 C 200 262, 180 262, 170 253 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" filter="drop-shadow(0 0 3px #60a5fa)" />
    <path d="M 430 248 C 415 248, 390 250, 388 255 C 400 262, 420 262, 430 253 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" filter="drop-shadow(0 0 3px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="275" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="284" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
