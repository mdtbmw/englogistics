<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy airport departures terminal facade -->
    <path d="M 60 300 L 60 100 L 540 100 L 540 300" stroke-dasharray="3,3" />
    <path d="M 120 100 L 120 300 M 240 100 L 240 300 M 360 100 L 360 300 M 480 100 L 480 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Hiace Bus - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under bus -->
    <ellipse cx="300" cy="310" rx="200" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- White / Silver Body Gradients for Hiace Bus -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="60%" stop-color="#f4f4f5" />
        <stop offset="100%" stop-color="#d4d4d8" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#e4e4e7" />
        <stop offset="100%" stop-color="#a1a1aa" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(165, 280)">
      <circle cx="0" cy="0" r="34" fill="#18181b" />
      <circle cx="0" cy="0" r="22" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>
    <g transform="translate(435, 280)">
      <circle cx="0" cy="0" r="34" fill="#18181b" />
      <circle cx="0" cy="0" r="22" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>

    <!-- Bus Silhouette (Hiace Boxy Shape) -->
    <path d="M 130 280 
             L 130 150 
             C 130 140, 150 135, 175 135
             L 425 135
             C 450 135, 470 145, 470 180
             L 470 280
             Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
             
    <!-- Large Panoramic Windshield -->
    <path d="M 200 185 L 400 185 L 425 142 L 175 142 Z" fill="url(#glassGrad)" />
    <!-- Side Windows -->
    <path d="M 135 150 L 165 150 L 190 185 L 135 185 Z" fill="url(#glassGrad)" stroke="#52525b" />
    <path d="M 435 150 L 465 150 L 465 185 L 410 185 Z" fill="url(#glassGrad)" stroke="#52525b" />
             
    <!-- Front Bonnet (Stubby nose of Hiace) -->
    <path d="M 170 190 C 220 190, 380 190, 430 190 C 445 220, 450 240, 435 250 C 380 252, 220 252, 165 250 C 150 240, 155 220, 170 190 Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
    
    <!-- Chrome Grille -->
    <path d="M 215 250 C 240 252, 360 252, 385 250 C 380 270, 220 270, 215 250 Z" fill="url(#grilleGrad)" stroke="#71717a" stroke-width="1.5" />
    <circle cx="300" cy="258" r="8" fill="none" stroke="#71717a" stroke-width="1.5" />
    
    <!-- Headlights -->
    <rect x="165" y="245" width="40" height="15" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="drop-shadow(0 0 3px #60a5fa)" />
    <rect x="395" y="245" width="40" height="15" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="drop-shadow(0 0 3px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="275" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="284" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
