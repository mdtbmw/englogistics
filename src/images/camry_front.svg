<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy city buildings outline -->
    <path d="M 40 300 L 40 180 L 100 180 L 100 300 M 100 220 L 160 220 L 160 300" stroke-dasharray="3,3" />
    <path d="M 500 300 L 500 160 L 560 160 L 560 300" stroke-dasharray="2,2" />
    <!-- Horizon / Ground -->
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Camry 2010 - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under car -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Navy Blue Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e3a8a" />
        <stop offset="50%" stop-color="#172554" />
        <stop offset="100%" stop-color="#0f172a" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#020617" />
        <stop offset="100%" stop-color="#1e293b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(170, 275)">
      <circle cx="0" cy="0" r="32" fill="#18181b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>
    <g transform="translate(430, 275)">
      <circle cx="0" cy="0" r="32" fill="#18181b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>

    <!-- Car Upper Cabin -->
    <path d="M 140 270 
             C 140 230, 160 212, 180 202 
             C 210 188, 230 148, 280 148 
             C 330 148, 380 152, 420 202
             C 440 212, 460 235, 460 270
             Z" fill="url(#bodyGrad)" stroke="#2563eb" stroke-width="0.5" />
             
    <!-- Windshield -->
    <path d="M 230 195 
             C 240 162, 270 155, 290 155 
             C 330 155, 360 162, 380 195 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Hood -->
    <path d="M 180 202 C 220 202, 380 202, 420 202 C 440 230, 445 250, 430 255 C 380 258, 220 258, 170 255 Z" fill="url(#bodyGrad)" stroke="#1e40af" stroke-width="1" />
    
    <!-- Front Grille & Headlights -->
    <!-- Bumper -->
    <path d="M 155 255 C 200 260, 400 260, 445 255 C 455 272, 435 292, 415 292 C 370 292, 230 292, 185 292 C 165 292, 145 272, 155 255 Z" fill="url(#bodyGrad)" />
    
    <!-- Chrome Grille (Camry 2010 Style) -->
    <path d="M 225 255 C 250 257, 350 257, 375 255 C 370 272, 230 272, 225 255 Z" fill="url(#grilleGrad)" stroke="#d4d4d8" stroke-width="1.5" />
    <circle cx="300" cy="262" r="7" fill="none" stroke="#d4d4d8" stroke-width="1.5" />
    
    <!-- Left Headlight -->
    <path d="M 175 252 C 190 252, 215 255, 218 260 C 205 266, 185 266, 175 257 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" filter="drop-shadow(0 0 3px #60a5fa)" />
    <!-- Right Headlight -->
    <path d="M 425 252 C 410 252, 385 255, 382 260 C 395 266, 415 266, 425 257 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" filter="drop-shadow(0 0 3px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="275" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="284" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
