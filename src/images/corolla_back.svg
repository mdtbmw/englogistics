<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy Trees -->
    <path d="M 50 300 Q 55 240 60 180 T 65 140 M 60 180 Q 40 160 50 140" />
    <path d="M 53 140 C 40 130 35 110 45 95 C 55 80 75 80 85 95 Z" stroke-dasharray="3,3" />
    <path d="M 530 300 Q 525 250 520 200 M 520 200 Q 500 180 505 160" />
    <path d="M 510 160 C 495 150 490 130 500 115 C 510 100 530 100 540 115 Z" stroke-dasharray="2,3" />
    
    <!-- Horizon / Road Lines -->
    <path d="M 10 300 L 590 300" stroke-dasharray="5,5" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Corolla 2016 - Rear Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under car -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f4f4f5" />
        <stop offset="50%" stop-color="#d4d4d8" />
        <stop offset="100%" stop-color="#71717a" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="50%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
      <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(175, 275)">
      <ellipse cx="0" cy="0" rx="32" ry="32" fill="url(#wheelGrad)" />
      <ellipse cx="0" cy="0" rx="20" ry="20" fill="#71717a" stroke="#a1a1aa" stroke-width="2" />
    </g>
    <g transform="translate(425, 275)">
      <ellipse cx="0" cy="0" rx="32" ry="32" fill="url(#wheelGrad)" />
      <ellipse cx="0" cy="0" rx="20" ry="20" fill="#71717a" stroke="#a1a1aa" stroke-width="2" />
    </g>

    <!-- Car Upper Cabin & Roof -->
    <path d="M 150 270 
             C 150 220, 180 200, 200 195 
             C 230 180, 250 148, 290 148 
             C 340 148, 370 180, 400 195
             C 420 200, 450 220, 450 270
             Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
             
    <!-- Rear Windshield -->
    <path d="M 235 195 
             C 245 160, 275 155, 290 155 
             C 325 155, 355 160, 365 195
             C 350 198, 250 198, 235 195 Z" fill="url(#glassGrad)" />
             
    <!-- Trunk / Boot Lid -->
    <path d="M 190 200 C 230 200, 370 200, 410 200 C 430 225, 435 240, 420 255 C 380 258, 220 258, 180 255 C 170 240, 175 225, 190 200 Z" fill="url(#bodyGrad)" stroke="#71717a" stroke-width="1" />
    
    <!-- Rear Lights & Bumper -->
    <!-- Bumper -->
    <path d="M 155 255 C 200 260, 400 260, 445 255 C 455 275, 435 295, 415 295 C 370 295, 230 295, 185 295 C 165 295, 145 275, 155 255 Z" fill="#27272a" />
    
    <!-- Left Tail Light (Red Glow) -->
    <path d="M 170 250 C 185 250, 198 252, 200 258 C 190 262, 175 262, 170 255 Z" fill="#ef4444" stroke="#dc2626" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    <!-- Right Tail Light (Red Glow) -->
    <path d="M 430 250 C 415 250, 402 252, 400 258 C 410 262, 425 262, 430 255 Z" fill="#ef4444" stroke="#dc2626" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    
    <!-- Chrome Strip -->
    <line x1="210" y1="256" x2="390" y2="256" stroke="#e4e4e7" stroke-width="2.5" />
    <!-- Toyota Logo -->
    <circle cx="300" cy="250" r="5" fill="none" stroke="#e4e4e7" stroke-width="1.5" />

    <!-- License Plate -->
    <rect x="270" y="265" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="274" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
