<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy Trees and Horizon -->
    <path d="M 120 300 Q 115 250 110 200 M 110 200 Q 90 180 95 160 Z" stroke-dasharray="3,3" />
    <path d="M 480 300 Q 475 250 470 200" />
    <path d="M 10 300 L 590 300" stroke-dasharray="5,5" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Corolla 2016 - Side View) -->
  <g id="vehicle">
    <!-- Shadow under car -->
    <ellipse cx="300" cy="305" rx="200" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f4f4f5" />
        <stop offset="50%" stop-color="#d4d4d8" />
        <stop offset="100%" stop-color="#71717a" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
      <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(190, 280)">
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#a1a1aa" stroke-width="2" />
      <circle cx="0" cy="0" r="8" fill="#e4e4e7" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#e4e4e7" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#e4e4e7" stroke-width="2" />
    </g>
    <g transform="translate(410, 280)">
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#a1a1aa" stroke-width="2" />
      <circle cx="0" cy="0" r="8" fill="#e4e4e7" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#e4e4e7" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#e4e4e7" stroke-width="2" />
    </g>

    <!-- Car Silhouette Side Profile -->
    <path d="M 100 280
             C 100 270, 110 260, 130 250
             L 140 230
             C 145 220, 160 215, 175 210
             L 210 175
             C 230 160, 260 155, 320 155
             C 380 155, 410 165, 430 185
             L 470 220
             C 490 230, 500 245, 500 280
             Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
             
    <!-- Side Windows -->
    <path d="M 220 180
             L 255 180
             L 255 210
             L 215 210
             Z" fill="url(#glassGrad)" />
    <path d="M 265 180
             L 320 180
             L 320 210
             L 265 210
             Z" fill="url(#glassGrad)" />
    <path d="M 330 180
             L 380 180
             C 390 180, 400 190, 405 210
             L 330 210
             Z" fill="url(#glassGrad)" />
             
    <!-- Door Panels, Door Handles, Side Mirrors -->
    <!-- Door seam lines -->
    <line x1="260" y1="180" x2="260" y2="280" stroke="#71717a" stroke-width="1" />
    <line x1="325" y1="180" x2="325" y2="280" stroke="#71717a" stroke-width="1" />
    <!-- Door handles -->
    <rect x="270" y="220" width="15" height="4" fill="#a1a1aa" rx="1" stroke="#52525b" stroke-width="0.5" />
    <rect x="335" y="220" width="15" height="4" fill="#a1a1aa" rx="1" stroke="#52525b" stroke-width="0.5" />
    <!-- Side Mirror -->
    <path d="M 205 200 C 195 200, 190 205, 192 210 L 205 208 Z" fill="#71717a" />
  </g>
</svg>
