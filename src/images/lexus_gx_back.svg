<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office buildings outline -->
    <path d="M 40 300 L 40 160 L 120 160 M 120 200 L 120 300" stroke-dasharray="3,3" />
    <path d="M 500 300 L 500 140 L 560 140" stroke-dasharray="2,2" />
    <!-- Horizon / Ground -->
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Lexus GX SUV - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Glossy Obsidian Black Gradients for Lexus GX -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#27272a" />
        <stop offset="50%" stop-color="#18181b" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#020617" />
        <stop offset="100%" stop-color="#1e293b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(175, 275)">
      <circle cx="0" cy="0" r="32" fill="#09090b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
    </g>
    <g transform="translate(425, 275)">
      <circle cx="0" cy="0" r="32" fill="#09090b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
    </g>

    <!-- SUV Tall Silhouette (Lexus Spindle Grille & Boxy cabin) -->
    <path d="M 145 280 
             L 145 140 
             C 145 135, 165 132, 175 132
             L 425 132
             C 450 132, 455 135, 455 140
             L 455 280
             Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="0.5" />
             
    <!-- Large Rear Glass -->
    <path d="M 160 142 L 440 142 L 440 195 L 160 195 Z" fill="url(#glassGrad)" />
             
    <!-- Rear Logo / Trim -->
    <path d="M 292 210 L 308 210 L 300 216 Z" fill="#e4e4e7" stroke="#e4e4e7" stroke-width="1" />
    <line x1="210" y1="218" x2="390" y2="218" stroke="#71717a" stroke-width="2.5" />
    
    <!-- Tail Lights -->
    <path d="M 150 210 C 165 210, 190 212, 192 218 C 182 222, 160 222, 150 215 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />
    <path d="M 450 210 C 435 210, 410 212, 408 218 C 418 222, 440 222, 450 215 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" filter="drop-shadow(0 0 3px #ef4444)" />

    <!-- License Plate -->
    <rect x="270" y="240" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="249" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
