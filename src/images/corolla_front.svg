<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy Trees -->
    <path d="M 50 300 Q 55 240 60 180 T 65 140 M 60 180 Q 40 160 50 140 T 60 110 M 60 180 Q 80 165 75 150 T 65 130" />
    <path d="M 53 140 C 40 130 35 110 45 95 C 55 80 75 80 85 95 C 95 110 85 130 70 135" stroke-dasharray="3,3" />
    
    <path d="M 530 300 Q 525 250 520 200 M 520 200 Q 500 180 505 160 T 515 130 M 520 200 Q 540 185 535 170 T 525 150" />
    <path d="M 510 160 C 495 150 490 130 500 115 C 510 100 530 100 540 115 C 550 130 540 150 525 155" stroke-dasharray="2,3" />
    
    <!-- Sketchy Horizon / Road Lines -->
    <path d="M 10 300 L 590 300 M 30 305 L 570 305 M 80 315 L 520 315" stroke-dasharray="5,5" />
    <path d="M 150 300 L 220 380 M 450 300 L 380 380" stroke-dasharray="10,10" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Corolla 2016 - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under car -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Main Car Body Shape (Silver Metallic Gradient) -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f4f4f5" />
        <stop offset="50%" stop-color="#d4d4d8" />
        <stop offset="100%" stop-color="#71717a" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#27272a" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e293b" />
        <stop offset="50%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
      <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <!-- Front Left Wheel -->
    <g transform="translate(170, 275)">
      <ellipse cx="0" cy="0" rx="32" ry="32" fill="url(#wheelGrad)" />
      <ellipse cx="0" cy="0" rx="20" ry="20" fill="#71717a" stroke="#a1a1aa" stroke-width="2" />
      <circle cx="0" cy="0" r="8" fill="#e4e4e7" />
      <!-- Spokes -->
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#e4e4e7" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#e4e4e7" stroke-width="2" />
      <line x1="-11" y1="-11" x2="11" y2="11" stroke="#e4e4e7" stroke-width="2" />
      <line x1="11" y1="-11" x2="-11" y2="11" stroke="#e4e4e7" stroke-width="2" />
    </g>
    
    <!-- Front Right Wheel -->
    <g transform="translate(430, 275)">
      <ellipse cx="0" cy="0" rx="32" ry="32" fill="url(#wheelGrad)" />
      <ellipse cx="0" cy="0" rx="20" ry="20" fill="#71717a" stroke="#a1a1aa" stroke-width="2" />
      <circle cx="0" cy="0" r="8" fill="#e4e4e7" />
      <!-- Spokes -->
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#e4e4e7" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#e4e4e7" stroke-width="2" />
      <line x1="-11" y1="-11" x2="11" y2="11" stroke="#e4e4e7" stroke-width="2" />
      <line x1="11" y1="-11" x2="-11" y2="11" stroke="#e4e4e7" stroke-width="2" />
    </g>

    <!-- Car Silhouette & Upper Cabin -->
    <path d="M 140 270 
             C 140 230, 160 210, 180 200 
             C 210 185, 230 145, 280 145 
             C 330 145, 380 150, 420 200
             C 440 210, 460 235, 460 270
             Z" fill="url(#bodyGrad)" stroke="#a1a1aa" stroke-width="1" />
             
    <!-- Windshield & Side Windows -->
    <path d="M 230 195 
             C 240 160, 270 152, 290 152 
             C 330 152, 360 160, 380 195
             C 360 198, 250 198, 230 195 Z" fill="url(#glassGrad)" />
             
    <path d="M 390 195 C 400 195, 415 208, 418 220 C 400 220, 392 205, 390 195 Z" fill="url(#glassGrad)" />
    
    <!-- Bonnet / Hood -->
    <path d="M 180 200 C 220 200, 380 200, 420 200 C 440 230, 445 250, 430 255 C 380 258, 220 258, 170 255 C 160 250, 165 230, 180 200 Z" fill="url(#bodyGrad)" stroke="#71717a" stroke-width="1" />
    
    <!-- Front Bumper, Headlights & Grille -->
    <!-- Bumper -->
    <path d="M 155 255 C 200 260, 400 260, 445 255 C 455 275, 435 295, 415 295 C 370 295, 230 295, 185 295 C 165 295, 145 275, 155 255 Z" fill="#27272a" />
    
    <!-- Grille -->
    <path d="M 220 255 C 250 257, 350 257, 380 255 C 375 275, 225 275, 220 255 Z" fill="url(#grilleGrad)" stroke="#52525b" stroke-width="1.5" />
    <!-- Toyota Emblem -->
    <circle cx="300" cy="263" r="8" fill="none" stroke="#e4e4e7" stroke-width="2" />
    <ellipse cx="300" cy="263" rx="6" ry="3" fill="none" stroke="#e4e4e7" stroke-width="1.5" />
    
    <!-- Left Headlight -->
    <path d="M 175 252 C 190 252, 215 255, 218 260 C 205 268, 185 268, 175 257 Z" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="drop-shadow(0 0 4px #60a5fa)" />
    <!-- Right Headlight -->
    <path d="M 425 252 C 410 252, 385 255, 382 260 C 395 268, 415 268, 425 257 Z" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="drop-shadow(0 0 4px #60a5fa)" />
    
    <!-- License Plate -->
    <rect x="270" y="278" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="287" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
