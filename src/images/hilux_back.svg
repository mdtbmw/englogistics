<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <path d="M 50 300 Q 150 200 300 200 T 550 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Hilux 2023 - Rear View) -->
  <g id="vehicle">
    <!-- Shadow under pickup -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Charcoal Grey Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#71717a" />
        <stop offset="50%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(175, 275)">
      <circle cx="0" cy="0" r="34" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#52525b" stroke="#a1a1aa" stroke-width="2" />
    </g>
    <g transform="translate(425, 275)">
      <circle cx="0" cy="0" r="34" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#52525b" stroke="#a1a1aa" stroke-width="2" />
    </g>

    <!-- Pickup Silhouette (Hilux Bed & Tailgate shape) -->
    <path d="M 145 280 
             L 145 170 
             L 455 170 
             L 455 280
             Z" fill="url(#bodyGrad)" stroke="#27272a" stroke-width="0.5" />
             
    <!-- Rear Cabin Window (behind pickup bed) -->
    <path d="M 175 170 L 175 140 C 175 135, 195 132, 215 132 L 385 132 C 405 132, 425 135, 425 140 L 425 170 Z" fill="url(#bodyGrad)" />
    <path d="M 190 165 L 410 165 L 410 140 C 410 138, 400 136, 385 136 L 215 136 C 200 136, 190 138, 190 140 Z" fill="url(#glassGrad)" />
             
    <!-- Tailgate Details -->
    <line x1="170" y1="210" x2="430" y2="210" stroke="#18181b" stroke-width="2" />
    <text x="300" y="235" font-family="'Outfit', sans-serif" font-weight="900" font-size="14" fill="#71717a" text-anchor="middle" letter-spacing="4">H I L U X</text>
    
    <!-- Tail Lights (Vertical rectangular tail lights on sides) -->
    <rect x="148" y="190" width="10" height="55" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5" filter="drop-shadow(0 0 3px #ef4444)" rx="2" />
    <rect x="442" y="190" width="10" height="55" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5" filter="drop-shadow(0 0 3px #ef4444)" rx="2" />

    <!-- Tailgate Handle -->
    <rect x="285" y="180" width="30" height="8" fill="#18181b" rx="2" />

    <!-- License Plate -->
    <rect x="270" y="275" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="284" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
