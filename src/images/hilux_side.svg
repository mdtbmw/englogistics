<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <path d="M 50 300 Q 55 240 60 180" />
    <path d="M 530 300 Q 525 250 520 200" />
    <path d="M 10 300 L 590 300" stroke-dasharray="5,5" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Hilux 2023 - Side View) -->
  <g id="vehicle">
    <!-- Shadow under pickup -->
    <ellipse cx="300" cy="305" rx="220" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Charcoal Grey Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#71717a" />
        <stop offset="50%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(180, 275)">
      <circle cx="0" cy="0" r="36" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#52525b" stroke="#cbd5e1" stroke-width="2" />
      <circle cx="0" cy="0" r="6" fill="#f1f5f9" />
    </g>
    <g transform="translate(420, 275)">
      <circle cx="0" cy="0" r="36" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#52525b" stroke="#cbd5e1" stroke-width="2" />
      <circle cx="0" cy="0" r="6" fill="#f1f5f9" />
    </g>

    <!-- Pickup Silhouette Side Profile (Double cab cabin & rear pickup bed) -->
    <path d="M 80 275
             L 80 230
             C 80 220, 105 205, 125 195
             L 165 170
             C 185 155, 225 150, 305 150
             L 370 150 
             L 370 195 
             L 510 195 
             L 510 275
             Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="0.5" />
             
    <!-- Side Windows -->
    <path d="M 175 160 L 225 160 L 225 195 L 175 195 Z" fill="url(#glassGrad)" />
    <path d="M 235 160 L 325 160 L 325 195 L 235 195 Z" fill="url(#glassGrad)" />
             
    <!-- Door Panel Seams, Handles -->
    <line x1="230" y1="150" x2="230" y2="275" stroke="#3f3f46" stroke-width="1" />
    <line x1="330" y1="150" x2="330" y2="275" stroke="#3f3f46" stroke-width="1" />
    <!-- Door handles -->
    <rect x="240" y="210" width="15" height="4" fill="#a1a1aa" rx="1" stroke="#3f3f46" stroke-width="0.5" />
    <rect x="190" y="210" width="15" height="4" fill="#a1a1aa" rx="1" stroke="#3f3f46" stroke-width="0.5" />
  </g>
</svg>
