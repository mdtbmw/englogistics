<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy residential garage entrance -->
    <path d="M 420 300 L 420 150 L 550 150 L 550 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject & Boarding Passengers (Toyota Sienna Minivan) -->
  <g id="vehicle">
    <!-- Shadow under minivan -->
    <ellipse cx="300" cy="305" rx="210" ry="15" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Warm Bronze/Champagne Metallic Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" />
        <stop offset="50%" stop-color="#cbd5e1" />
        <stop offset="100%" stop-color="#64748b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#334155" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(180, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#cbd5e1" stroke-width="1.5" />
    </g>
    <g transform="translate(420, 275)">
      <circle cx="0" cy="0" r="32" fill="#1e293b" />
      <circle cx="0" cy="0" r="20" fill="#64748b" stroke="#cbd5e1" stroke-width="1.5" />
    </g>

    <!-- Minivan Silhouette Side Profile -->
    <path d="M 80 275
             L 80 230
             C 80 220, 110 205, 130 195
             L 170 170
             C 190 155, 230 150, 310 150
             C 380 150, 440 155, 470 185
             L 510 225
             C 525 235, 530 250, 530 275
             Z" fill="url(#bodyGrad)" stroke="#94a3b8" stroke-width="0.5" />
             
    <!-- Side Windows -->
    <path d="M 180 160 L 230 160 L 230 195 L 180 195 Z" fill="url(#glassGrad)" />
    <path d="M 340 160 L 420 160 L 415 195 L 340 195 Z" fill="url(#glassGrad)" />

    <!-- Open Sliding Door Space (revealing interior) -->
    <rect x="235" y="150" width="100" height="122" fill="#0f172a" rx="5" />
    <path d="M 245 200 L 285 200 L 285 230 L 245 230 Z" fill="#334155" /> <!-- Seats -->

    <!-- Chauffeur Standing and Greeting (Black person, Navy Suit) -->
    <g id="chauffeur" transform="translate(205, 160)">
      <!-- Head (Black Skin Color: #451a03) -->
      <circle cx="0" cy="12" r="8" fill="#451a03" />
      <path d="M -8 24 C -8 24, -4 22, 0 24 C 4 22, 8 24, 8 40 L 5 80 L -5 80 Z" fill="#050548" />
      <path d="M -3 80 L -5 110 M 3 80 L 5 110" stroke="#050548" stroke-width="5" />
    </g>

    <!-- Family boarding (Black mother and Black child) -->
    <g id="family" transform="translate(270, 170)">
      <!-- Mother (Black woman, Pink Dress) -->
      <circle cx="0" cy="12" r="8" fill="#5f3e2d" />
      <path d="M -8 24 C -8 24, -4 22, 0 24 C 4 22, 8 24, 8 40 L 5 85 L -5 85 Z" fill="#be185d" />
      <path d="M -3 85 L -8 110 M 3 85 L 6 110" stroke="#5f3e2d" stroke-width="5" />
      
      <!-- Child (Black child, Blue shirt) -->
      <g transform="translate(18, 30)">
        <circle cx="0" cy="8" r="6" fill="#3b2314" />
        <path d="M -5 16 C -5 16, -2 14, 0 16 C 2 14, 5 16, 5 28 L 3 60 L -3 60 Z" fill="#0369a1" />
        <path d="M -2 60 L -4 80 M 2 60 L 4 80" stroke="#3b2314" stroke-width="4.5" />
      </g>
    </g>

    <!-- Open sliding door flapped back slightly in perspective -->
    <rect x="330" y="150" width="90" height="122" fill="url(#bodyGrad)" stroke="#475569" stroke-width="1" rx="5" />
    <path d="M 340 160 L 420 160 L 415 195 L 340 195 Z" fill="url(#glassGrad)" />
  </g>
</svg>
