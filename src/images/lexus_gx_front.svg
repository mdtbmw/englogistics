<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Sketchy office buildings outline -->
    <path d="M 40 300 L 40 160 L 120 160 L 120 300" stroke-dasharray="3,3" />
    <path d="M 500 300 L 500 140 L 560 140 L 560 300" stroke-dasharray="2,2" />
    <!-- Horizon / Ground -->
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Lexus GX SUV - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under SUV -->
    <ellipse cx="300" cy="305" rx="190" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Glossy Obsidian Black Gradients for Lexus GX -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#27272a" />
        <stop offset="50%" stop-color="#18181b" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#020617" />
        <stop offset="100%" stop-color="#1e293b" />
      </linearGradient>
    </defs>

    <!-- Wheels -->
    <g transform="translate(170, 275)">
      <circle cx="0" cy="0" r="32" fill="#09090b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>
    <g transform="translate(430, 275)">
      <circle cx="0" cy="0" r="32" fill="#09090b" />
      <circle cx="0" cy="0" r="20" fill="#71717a" stroke="#d4d4d8" stroke-width="1.5" />
      <circle cx="0" cy="0" r="6" fill="#e4e4e7" />
    </g>

    <!-- SUV Tall Silhouette (Lexus Spindle Grille & Boxy cabin) -->
    <path d="M 140 270 
             C 140 220, 155 200, 175 190 
             C 200 175, 220 135, 270 135 
             C 320 135, 380 140, 425 190
             C 445 200, 460 220, 460 270
             Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="0.5" />
             
    <!-- Windshield -->
    <path d="M 225 185 
             C 235 152, 270 145, 290 145 
             C 330 145, 365 152, 375 185 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Hood (Heavy, muscular) -->
    <path d="M 175 190 C 220 190, 380 190, 425 190 C 445 220, 448 240, 435 245 C 380 248, 220 248, 165 245 Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="1" />
    
    <!-- Front Grille (Lexus Spindle Grille shape) -->
    <path d="M 230 245 L 370 245 L 350 288 L 250 288 Z" fill="url(#grilleGrad)" stroke="#71717a" stroke-width="1.5" />
    <!-- Lexus L Logo -->
    <path d="M 292 260 L 305 260 L 298 266 Z" fill="#e4e4e7" stroke="#e4e4e7" stroke-width="1.5" />
    
    <!-- Sharp Headlights (Lexus L-Finesse LED design) -->
    <path d="M 170 242 C 185 242, 220 245, 225 248 C 215 255, 185 255, 170 246 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 4px #60a5fa)" />
    <path d="M 430 242 C 415 242, 380 245, 375 248 C 385 255, 415 255, 430 246 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 4px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="275" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="284" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
