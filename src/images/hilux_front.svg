<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Hand-drawn Pencil Sketch Background Elements -->
  <g stroke="#71717a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <path d="M 50 300 Q 150 200 300 200 T 550 300 M 300 200 L 300 300" stroke-dasharray="3,3" />
    <path d="M 10 300 L 590 300" />
  </g>
  
  <!-- Realistic Vehicle Subject (Toyota Hilux 2023 - Front Three-Quarters View) -->
  <g id="vehicle">
    <!-- Shadow under pickup -->
    <ellipse cx="300" cy="305" rx="200" ry="18" fill="rgba(0,0,0,0.15)" filter="blur(8px)" />
    
    <!-- Metallic Charcoal Grey Gradients -->
    <defs>
      <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#71717a" />
        <stop offset="50%" stop-color="#3f3f46" />
        <stop offset="100%" stop-color="#18181b" />
      </linearGradient>
      <linearGradient id="grilleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#27272a" />
        <stop offset="100%" stop-color="#09090b" />
      </linearGradient>
      <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0f172a" />
        <stop offset="100%" stop-color="#020617" />
      </linearGradient>
    </defs>

    <!-- Wheels (High clearance off-road tires of Hilux) -->
    <g transform="translate(165, 275)">
      <circle cx="0" cy="0" r="36" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#52525b" stroke="#a1a1aa" stroke-width="2" />
      <circle cx="0" cy="0" r="6" fill="#d4d4d8" />
    </g>
    <g transform="translate(435, 275)">
      <circle cx="0" cy="0" r="36" fill="#09090b" />
      <circle cx="0" cy="0" r="22" fill="#52525b" stroke="#a1a1aa" stroke-width="2" />
      <circle cx="0" cy="0" r="6" fill="#d4d4d8" />
    </g>

    <!-- Pickup Tall Silhouette (Hilux Rugged Stance) -->
    <path d="M 130 270 
             C 130 225, 145 205, 165 195 
             C 190 180, 215 145, 265 145 
             C 315 145, 370 150, 420 195
             C 440 205, 470 220, 470 270
             Z" fill="url(#bodyGrad)" stroke="#3f3f46" stroke-width="0.5" />
             
    <!-- Windshield -->
    <path d="M 225 190 
             C 235 157, 270 150, 290 150 
             C 330 150, 365 157, 375 190 Z" fill="url(#glassGrad)" />
             
    <!-- Bonnet / Hood -->
    <path d="M 175 195 C 220 195, 380 195, 425 195 C 445 220, 448 240, 435 245 C 380 248, 220 248, 165 245 Z" fill="url(#bodyGrad)" stroke="#27272a" stroke-width="1" />
    
    <!-- Bold Front Grille -->
    <path d="M 220 245 C 250 247, 350 247, 380 245 C 375 278, 225 278, 220 245 Z" fill="url(#grilleGrad)" stroke="#27272a" stroke-width="1.5" />
    <!-- Toyota Logo -->
    <circle cx="300" cy="254" r="8" fill="none" stroke="#a1a1aa" stroke-width="2" />
    
    <!-- LED Headlights -->
    <path d="M 170 242 C 185 242, 215 245, 218 248 C 208 255, 180 255, 170 246 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 3px #60a5fa)" />
    <path d="M 430 242 C 415 242, 385 245, 382 248 C 392 255, 420 255, 430 246 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="drop-shadow(0 0 3px #60a5fa)" />

    <!-- License Plate -->
    <rect x="270" y="280" width="60" height="12" fill="#eab308" rx="2" stroke="#1e293b" stroke-width="1" />
    <text x="300" y="289" font-family="monospace" font-weight="bold" font-size="8" fill="#000000" text-anchor="middle">ENGRACED</text>
  </g>
</svg>
